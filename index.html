<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bugnil-D-N-A</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020205; color: #e2e8f0; font-family: sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .app-header { background: linear-gradient(180deg, #1e1e38 0%, #080812 100%); border-bottom: 2px solid #3b82f6; text-shadow: 0 0 10px #3b82f6; }
        .btn-3d { height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 900; transition: 0.1s; box-shadow: 2px 2px 4px rgba(0,0,0,0.6), inset 1px 1px 0px rgba(255,255,255,0.1); border: 1px solid rgba(0,0,0,0.4); }
        .btn-3d:active { transform: translateY(1px); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.8); }
        .btn-p { background: linear-gradient(145deg, #2563eb, #1d4ed8); font-size: 20px; }
        .btn-b { background: linear-gradient(145deg, #dc2626, #b91c1c); font-size: 20px; }
        .btn-win { background: linear-gradient(145deg, #16a34a, #15803d); font-size: 10px; }
        .btn-loss { background: linear-gradient(145deg, #b91c1c, #991b1b); font-size: 10px; }
        .btn-util { background: linear-gradient(145deg, #334155, #1e293b); color: #94a3b8; font-size: 9px; }
        .btn-reset { background: linear-gradient(145deg, #450a0a, #000000); color: #f87171; font-size: 9px; }
        .dot-w { color: #4ade80; font-weight: bold; font-size: 16px; } 
        .dot-l { color: #f87171; font-weight: bold; font-size: 16px; }
        .card { border-radius: 6px; background: #0c0c1d; border: 1px solid #1e1e38; }
        .card-selected { border: 2px solid #fbbf24 !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="app-header py-2 text-center">
        <h1 class="text-indigo-400 font-black italic tracking-tighter text-xl">BUGNIL-D-N-A <span class="text-[8px] not-italic text-gray-500">v1.0</span></h1>
    </div>

    <!-- 💰 Financial Dashboard -->
    <div class="bg-[#080812] border-b border-gray-800 p-2 shadow-2xl">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-1.5 text-center mb-3">
            <div class="bg-black/60 p-2 rounded-lg border border-gray-800">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">ทุน</p>
                <input type="number" id="capIn" value="1000" oninput="updateFinance()" class="bg-transparent text-yellow-500 text-xl font-black w-full text-center outline-none">
            </div>
            <div class="bg-black/60 p-2 rounded-lg border border-gray-800">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">เป้า %</p>
                <input type="number" id="targetPer" value="10" oninput="updateFinance()" class="bg-transparent text-green-400 text-xl font-black w-full text-center outline-none">
            </div>
            <div class="bg-black/60 p-2 rounded-lg border border-gray-800">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1 text-red-400">กำไร</p>
                <p id="pText" class="text-xl font-black text-white">0</p>
            </div>
            <div class="bg-black/60 p-2 rounded-lg border border-gray-800">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">หน่วย</p>
                <input type="number" id="unitIn" value="100" oninput="updateFinance()" class="bg-transparent text-indigo-400 text-xl font-black w-full text-center outline-none">
            </div>
        </div>
        
        <div class="max-w-md mx-auto bg-indigo-500/10 p-4 rounded-xl border-2 border-indigo-500/30 flex justify-between items-center shadow-inner">
            <div class="flex flex-col">
                <span class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider mb-1">NEXT : 1-3-2-6</span>
                <span id="nextUnit" class="text-5xl font-black text-white leading-none">1 <span class="text-xs text-gray-600">UNIT</span></span>
            </div>
            
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-gray-500 font-bold uppercase mb-1 italic">วางเงิน:</span>
                <span id="betMoney" class="text-5xl font-black text-green-500 tracking-tighter">100</span>
                <div id="stepDots" class="flex gap-2 mt-2">
                    <span class="w-3 h-3 rounded-full bg-indigo-500 shadow-[0_0_10px_#6366f1]"></span>
                    <span class="w-3 h-3 rounded-full bg-gray-800"></span>
                    <span class="w-3 h-3 rounded-full bg-gray-800"></span>
                    <span class="w-3 h-3 rounded-full bg-gray-800"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 🎮 Controller -->
    <div class="p-2 bg-[#05050a] border-b border-gray-800">
        <div class="max-w-md mx-auto">
            <div id="histBar" class="flex gap-1 overflow-x-auto mb-2 pb-1 border-b border-gray-900 min-h-[26px] items-center">
                <span class="text-gray-800 text-[9px] italic uppercase tracking-widest">Waiting DNA Data...</span>
            </div>
            <div class="flex flex-col gap-2">
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="add('P')" class="btn-3d btn-p">P</button>
                    <button onclick="add('B')" class="btn-3d btn-b">B</button>
                    <button onclick="undo()" class="btn-3d btn-util uppercase">Undo</button>
                    <button onclick="resetD()" class="btn-3d btn-reset uppercase">Reset DNA</button>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="manualM(true)" class="btn-3d btn-win uppercase">Win</button>
                    <button onclick="manualM(false)" class="btn-3d btn-loss uppercase">Loss</button>
                    <button onclick="resetM()" class="btn-3d btn-util uppercase text-indigo-400">Reset Mon</button>
                    <div class="bg-black/40 rounded flex items-center justify-center text-[10px] text-gray-700 font-bold border border-gray-900">V.1</div>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-2">
        <div id="fSec" class="hidden"><div id="fCont" class="max-w-md mx-auto mb-2"></div></div>
        <div id="gCont" class="grid grid-cols-1 gap-2 max-w-md mx-auto pb-10"></div>
    </div>

    <script>
        let history = [];
        let selectedId = null;
        let profit = 0;
        let stepIdx = 0;
        const steps = [1, 3, 2, 6];

        const algos = Array.from({ length: 30 }, (_, i) => ({
            id: `M${String(i + 1).padStart(2, '0')}`,
            seed: i % 4, results: [], winRate: 0, pred: ''
        }));

        function add(val) {
            if (selectedId) {
                const a = algos.find(x => x.id === selectedId);
                processM(a.pred === val);
            }
            history.push(val);
            analyze(); render(); updateFinance();
        }

        function manualM(isWin) { processM(isWin); updateFinance(); }

        function processM(isWin) {
            const unit = Math.floor(parseFloat(document.getElementById('unitIn').value) || 0);
            if (isWin) {
                profit += (steps[stepIdx] * unit);
                stepIdx = (stepIdx + 1) % 4;
            } else {
                profit -= (steps[stepIdx] * unit);
                stepIdx = 0;
            }
        }

        function updateFinance() {
            const unitValue = Math.floor(parseFloat(document.getElementById('unitIn').value) || 0);
            const currentStepUnit = steps[stepIdx];
            
            document.getElementById('pText').innerText = Math.floor(profit).toLocaleString();
            document.getElementById('pText').className = `text-xl font-black ${profit >= 0 ? 'text-green-400' : 'text-red-400'}`;
            
            document.getElementById('nextUnit').innerHTML = `${currentStepUnit} <span class="text-xs text-gray-600">UNIT</span>`;
            document.getElementById('betMoney').innerText = Math.floor(currentStepUnit * unitValue);
            
            const dots = document.getElementById('stepDots').children;
            for(let i=0; i<4; i++) dots[i].className = `w-3 h-3 rounded-full ${i === stepIdx ? 'bg-indigo-500 shadow-[0_0_10px_#6366f1]' : 'bg-gray-800'}`;
        }

        function getPred(algo, hist) {
            if (hist.length === 0) return 'P';
            const last = hist[hist.length - 1];
            if (algo.seed === 0) return last;
            if (algo.seed === 1) return last === 'P' ? 'B' : 'P';
            if (algo.seed === 2) return (hist.length % 2 === 0) ? 'P' : 'B';
            return (parseInt(algo.id.slice(1)) + hist.length) % 3 === 0 ? 'B' : 'P';
        }

        function analyze() {
            algos.forEach(a => {
                let res = [];
                for (let i = 1; i < history.length; i++) {
                    const p = getPred(a, history.slice(0, i));
                    res.push(p === history[i] ? '✅' : '❌');
                }
                a.results = res.slice(-10);
                const wins = a.results.filter(r => r === '✅').length;
                a.winRate = Math.round((wins / a.results.length) * 100) || 0;
                a.pred = getPred(a, history);
            });
        }

        function render() {
            const grid = document.getElementById('gCont');
            const focus = document.getElementById('fCont');
            const bar = document.getElementById('histBar');
            grid.innerHTML = ''; focus.innerHTML = '';
            bar.innerHTML = history.length ? history.map(h => `<div class="history-item h-${h.toLowerCase()}">${h}</div>`).join('') : '<span class="text-gray-800 text-[9px] italic uppercase tracking-widest">Waiting DNA Data...</span>';
            bar.scrollLeft = bar.scrollWidth;

            [...algos].sort((a,b) => b.winRate - a.winRate).forEach(a => {
                const card = document.createElement('div');
                card.className = `card ${a.id === selectedId ? 'card-selected' : ''}`;
                card.onclick = () => { selectedId = (selectedId === a.id ? null : a.id); render(); updateFinance(); };
                card.innerHTML = `
                    <div class="px-2 py-0.5 text-[8px] font-bold flex justify-between bg-black/50 border-b border-gray-800">
                        <span>${a.id} MODEL</span><span>${a.winRate}%</span>
                    </div>
                    <div class="p-2 flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-black ${a.pred === 'P' ? 'bg-blue-600' : 'bg-red-600'}">${a.pred}</div>
                        <div class="flex flex-wrap gap-1 leading-none">${a.results.map(r => `<span class="${r === '✅' ? 'dot-w' : 'dot-l'}">${r}</span>`).join('') || '...'}</div>
                    </div>`;
                if (a.id === selectedId) { document.getElementById('fSec').classList.remove('hidden'); focus.appendChild(card); }
                else if (a.winRate >= 55) grid.appendChild(card);
            });
            if (!selectedId) document.getElementById('fSec').classList.add('hidden');
        }

        function undo() { history.pop(); analyze(); render(); updateFinance(); }
        function resetD() { if(confirm("Reset DNA?")) { history=[]; selectedId=null; analyze(); render(); } }
        function resetM() { if(confirm("Reset Money?")) { profit=0; stepIdx=0; updateFinance(); } }

        analyze(); render(); updateFinance();
    </script>
</body>
</html>
