<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat DNA 256 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dna-card { transition: all 0.3s ease; }
        .win { color: #10b981; }
        .loss { color: #ef4444; }
        /* DNA 15px และเลื่อนข้าง */
        #dnaContainer {
            display: flex; gap: 4px; overflow-x: auto; padding: 10px;
            scroll-behavior: smooth; white-space: nowrap; align-items: center;
        }
        #dnaContainer::-webkit-scrollbar { height: 3px; }
        #dnaContainer::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .dna-item { font-size: 15px; font-weight: bold; flex-shrink: 0; }
        
        /* ปุ่มทั้งหมดตัวหนังสือ 17px และขนาดสมดุลกัน */
        .btn-style { 
            font-size: 17px; font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
            height: 50px; width: 100%;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-2 md:p-8">
    <div class="max-w-md mx-auto">
        <!-- Header (Compact) -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-yellow-400 to-yellow-600 bg-clip-text text-transparent italic">
                BACCARAT DNA 256
            </h1>
            <div class="text-right">
                <p class="text-[10px] text-green-400 font-mono tracking-widest animate-pulse">● LIVE</p>
            </div>
        </div>

        <!-- Stats Grid (Compact) -->
        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="bg-gray-800 p-2 rounded-xl border border-gray-700 text-center shadow-lg">
                <p class="text-gray-400 text-[9px] uppercase">Win Rate</p>
                <p id="winRate" class="text-base font-bold text-yellow-500">0%</p>
            </div>
            <div class="bg-gray-800 p-2 rounded-xl border border-gray-700 text-center shadow-lg">
                <p class="text-gray-400 text-[9px] uppercase">Max Loss</p>
                <p id="conLoss" class="text-base font-bold text-red-500">0</p>
            </div>
            <div class="bg-gray-800 p-2 rounded-xl border border-gray-700 text-center shadow-lg">
                <p class="text-gray-400 text-[9px] uppercase">Index</p>
                <p id="patternIdx" class="text-base font-bold text-blue-500">0/256</p>
            </div>
        </div>

        <!-- DNA Table (15px) -->
        <div class="bg-gray-800 p-3 rounded-2xl border border-gray-700 mb-6 shadow-xl">
            <h2 class="text-[10px] font-semibold mb-2 text-gray-400 uppercase tracking-widest italic">🧬 DNA Sequence</h2>
            <div id="dnaContainer" class="bg-gray-900/50 rounded-lg min-h-[45px]">
                <p class="text-gray-600 italic text-[10px] w-full text-center">Waiting...</p>
            </div>
        </div>

        <!-- Advice Box (Compact) -->
        <div class="bg-gray-800 p-3 rounded-2xl border border-yellow-600/20 mb-6 flex justify-between items-center px-4 shadow-lg">
            <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Next:</p>
            <p id="nextBet" class="text-lg font-black text-yellow-400 uppercase tracking-widest">-</p>
            <p id="betReason" class="text-[10px] text-gray-500 italic">รอ 3 ตาแรก</p>
        </div>

        <!-- Input & Control Buttons (17px) -->
        <div class="space-y-2 mb-6">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="addResult('P')" class="btn-style bg-blue-600 hover:bg-blue-500 rounded-xl shadow-lg active:scale-95 transition-all">PLAYER (P)</button>
                <button onclick="addResult('B')" class="btn-style bg-red-600 hover:bg-red-700 rounded-xl shadow-lg active:scale-95 transition-all">BANKER (B)</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="undoLast()" class="btn-style bg-gray-700 hover:bg-gray-600 rounded-xl text-gray-300">UNDO ย้อนกลับ</button>
                <button onclick="resetData()" class="btn-style bg-gray-800 hover:text-red-500 rounded-xl text-gray-500">RESET ล้างค่า</button>
            </div>
        </div>

        <!-- History P/B Only (Compact) -->
        <div class="bg-gray-800/50 rounded-2xl border border-gray-700 p-3">
            <h3 class="text-[9px] font-bold text-gray-500 uppercase mb-2 tracking-widest italic">Log (P/B)</h3>
            <div id="pbLog" class="flex flex-wrap gap-2 min-h-[24px] items-center justify-center">
                <p class="text-gray-700 italic text-[9px]">Waiting...</p>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const getPrediction = () => (history.length % 2 === 0 ? 'P' : 'B');

        function addResult(result) {
            const pred = getPrediction();
            history.push({ result, pred, isWin: result === pred });
            updateUI();
        }

        function undoLast() {
            if (history.length > 0) { history.pop(); updateUI(); }
        }

        function updateUI() {
            // DNA Update
            const dnaBox = document.getElementById('dnaContainer');
            dnaBox.innerHTML = history.length === 0 ? '<p class="text-gray-600 italic text-[10px] w-full text-center">Waiting...</p>' : '';
            
            let wins = 0, curL = 0, maxL = 0;
            history.forEach(item => {
                const span = document.createElement('span');
                span.className = item.isWin ? 'win dna-item' : 'loss dna-item';
                span.innerText = item.isWin ? '✔️' : '❌';
                dnaBox.appendChild(span);
                if (item.isWin) { wins++; curL = 0; } else { curL++; if (curL > maxL) maxL = curL; }
            });
            dnaBox.scrollLeft = dnaBox.scrollWidth;

            // Stats Update
            document.getElementById('winRate').innerText = history.length > 0 ? Math.round((wins / history.length) * 100) + '%' : '0%';
            document.getElementById('conLoss').innerText = maxL;
            document.getElementById('patternIdx').innerText = (history.length % 256) + '/256';

            // Advice Update
            const nextSide = getPrediction() === 'P' ? 'PLAYER' : 'BANKER';
            const nextBet = document.getElementById('nextBet');
            const betReason = document.getElementById('betReason');

            if (history.length < 3) {
                nextBet.innerText = "-";
                betReason.innerText = "รอ 3 ตาแรก";
            } else {
                nextBet.innerText = nextSide;
                nextBet.className = `text-xl font-black ${nextSide === 'PLAYER' ? 'text-blue-400' : 'text-red-400'}`;
                const last3 = history.slice(-3).map(h => h.isWin);
                betReason.innerText = last3.every(v => v === false) ? "🔥 สวนสูตร!" : "ตามสูตรปกติ";
            }

            // Log P/B Update
            const logBox = document.getElementById('pbLog');
            logBox.innerHTML = '';
            const recent = history.slice(-12); // แสดง 12 ตาล่าสุด
            recent.forEach(item => {
                const span = document.createElement('span');
                span.className = `font-black text-base ${item.result === 'P' ? 'text-blue-500' : 'text-red-500'}`;
                span.innerText = item.result;
                logBox.appendChild(span);
            });
            if (history.length === 0) logBox.innerHTML = '<p class="text-gray-700 italic text-[9px]">Waiting...</p>';
        }

        function resetData() { if (confirm("ล้างข้อมูลทั้งหมด?")) { history = []; updateUI(); } }
    </script>
</body>
</html>
