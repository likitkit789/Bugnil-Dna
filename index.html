<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Square Row Predictor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0f11; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #94a3b8; }
        .main-card { background: #1a1d21; padding: 15px; width: 360px; border: 1px solid #2d333b; }
        .display-box { background: #000; border: 1px solid #333; margin-bottom: 10px; padding: 15px; text-align: center; }
        
        .setting-row { display: flex; gap: 4px; margin-bottom: 10px; }
        .setting-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .input-dark { background: #121417; border: 1px solid #3f464d; color: #fff; text-align: center; font-size: 10px; width: 100%; padding: 4px 0; border-radius: 0; }
        
        .btn-row { display: flex; gap: 6px; }
        .btn-sq { flex: 1; aspect-ratio: 1 / 1; border: none; border-radius: 0 !important; font-weight: 900; font-size: 11px; color: #fff; cursor: pointer; transition: 0.1s; }
        .btn-sq:active { transform: translateY(2px); }
        
        .btn-p { background-color: #1e40af; border-bottom: 4px solid #1e3a8a; } 
        .btn-b { background-color: #991b1b; border-bottom: 4px solid #7f1d1d; } 
        .btn-u { background-color: #4b5563; border-bottom: 4px solid #334155; }
        .btn-r { background-color: #18181b; border-bottom: 4px solid #000; }

        .blink { animation: blinker 0.6s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- Display -->
        <div class="display-box">
            <div id="alert" class="text-[9px] text-yellow-500 font-bold h-4 mb-1 uppercase tracking-widest italic">Fast Analysis</div>
            <div id="next" class="text-3xl font-black text-gray-800 italic uppercase tracking-tighter">Wait...</div>
            <div class="text-[10px] text-gray-500 mt-1 font-bold uppercase">Rate: <span id="rate" class="text-green-500">0%</span></div>
        </div>

        <!-- Input Settings บรรทัดเดียว -->
        <div class="setting-row">
            <div class="setting-item">
                <p class="text-[8px] font-bold text-gray-600 mb-1 uppercase">Cap</p>
                <input type="number" id="capital" class="input-dark" value="1000" onchange="calc()">
            </div>
            <div class="setting-item">
                <p class="text-[8px] font-bold text-gray-600 mb-1 uppercase">Goal%</p>
                <input type="number" id="target-pct" class="input-dark" value="20" onchange="calc()">
            </div>
            <div class="setting-item">
                <p class="text-[8px] font-bold text-gray-600 mb-1 uppercase">Base</p>
                <input type="number" id="first-bet" class="input-dark" value="100" onchange="resetMoney()">
            </div>
        </div>

        <!-- Money Monitor -->
        <div class="bg-[#1e2227] border border-[#3f464d] p-3 mb-3">
            <div class="flex justify-between items-center mb-2">
                <div class="text-left">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Bet:</p>
                    <p id="bet-amount" class="text-xl font-black text-yellow-500">100</p>
                </div>
                <div class="text-right">
                    <p id="streak-info" class="text-[8px] font-bold text-blue-400 uppercase">Streak: 0</p>
                    <p class="text-xs font-bold text-white"><span id="curr-profit" class="text-green-400">0</span> / <span id="goal-val">200</span></p>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-1">
                <button onclick="money('win')" class="bg-green-700 text-white text-[9px] py-2 font-bold uppercase">Win</button>
                <button onclick="money('loss')" class="bg-red-800 text-white text-[9px] py-2 font-bold uppercase">Loss</button>
                <button onclick="money('reset')" class="bg-gray-700 text-white text-[9px] py-2 font-bold uppercase">Reset</button>
            </div>
        </div>

        <!-- History & WinLoss Check (เพิ่มกลับมาให้แล้ว) -->
        <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="bg-black/30 p-1.5 min-h-[40px] border border-gray-800">
                <p class="text-[7px] text-gray-600 font-bold uppercase border-b border-gray-800 mb-1">Raw History</p>
                <div id="log" class="text-[9px] font-bold tracking-[2px] break-all leading-tight"></div>
            </div>
            <div class="bg-black/30 p-1.5 min-h-[40px] border border-gray-800 text-center">
                <p class="text-[7px] text-gray-600 font-bold uppercase border-b border-gray-800 mb-1">Check Result</p>
                <div id="check-log" class="text-[10px] flex flex-wrap gap-0.5 justify-center"></div>
            </div>
        </div>

        <!-- 4 Buttons Square Row (Equal Size) -->
        <div class="btn-row">
            <button onclick="add('P')" class="btn-sq btn-p">P</button>
            <button onclick="add('B')" class="btn-sq btn-b">B</button>
            <button onclick="add('undo')" class="btn-sq btn-u">UNDO</button>
            <button onclick="add('reset-log')" class="btn-sq btn-r">RESET</button>
        </div>
    </div>

    <script>
        let logs = [], wl = [], currentPredict = null, profit = 0, winStreak = 0;

        function calc() {
            let cap = parseFloat(document.getElementById('capital').value);
            let pct = parseFloat(document.getElementById('target-pct').value);
            document.getElementById('goal-val').innerText = (cap * pct / 100).toFixed(0);
        }

        function resetMoney() {
            winStreak = 0; profit = 0;
            document.getElementById('bet-amount').innerText = document.getElementById('first-bet').value;
            document.getElementById('curr-profit').innerText = "0";
            document.getElementById('streak-info').innerText = "Streak: 0";
        }

        function money(act) {
            let base = parseFloat(document.getElementById('first-bet').value);
            let bet = parseFloat(document.getElementById('bet-amount').innerText);

            if (act === 'win') {
                profit += bet; winStreak++;
                if (winStreak >= 2) {
                    document.getElementById('bet-amount').innerText = base + profit;
                    document.getElementById('streak-info').innerText = "FLUSH PROFIT 🔥";
                } else {
                    document.getElementById('bet-amount').innerText = base;
                    document.getElementById('streak-info').innerText = `Streak: ${winStreak}`;
                }
            } else if (act === 'loss') {
                profit -= bet; winStreak = 0;
                document.getElementById('bet-amount').innerText = base;
                document.getElementById('streak-info').innerText = "Streak: 0";
            } else { resetMoney(); }
            document.getElementById('curr-profit').innerText = profit;
            if (profit >= parseFloat(document.getElementById('goal-val').innerText) && profit > 0) alert("🎯 ถึงเป้ากำไรแล้ว!");
        }

        function add(t) {
            if (t === 'undo') { logs.pop(); wl.pop(); }
            else if (t === 'reset-log') { if(confirm('Reset Log?')) { logs = []; wl = []; currentPredict = null; } }
            else {
                if (currentPredict) wl.push(t === currentPredict ? '✔️' : '❌');
                logs.push(t);
            }
            render();
        }

        function render() {
            document.getElementById('log').innerHTML = logs.map(x => `<span class="${x==='P'?'text-blue-500':'text-red-500'}">${x}</span>`).join('');
            document.getElementById('check-log').innerHTML = wl.map(x => `<span class="${x==='✔️'?'text-green-500':'text-red-500'}">${x}</span>`).join('');
            analyze();
        }

        function analyze() {
            const n = document.getElementById('next'), a = document.getElementById('alert'), r = document.getElementById('rate');
            if (logs.length < 5) {
                n.innerText = "WAIT..."; a.innerText = "SYNC DATA (" + logs.length + "/5)";
                currentPredict = null; return;
            }
            const p = logs.slice(-6).filter(x => x === 'P').length;
            const b = logs.slice(-6).filter(x => x === 'B').length;
            
            let pick = "";
            if (p >= 4) pick = "B";
            else if (b >= 4) pick = "P";
            else {
                n.innerText = "PASS"; a.innerText = "NO SIGNAL"; r.innerText = "0%";
                n.className = "text-3xl font-black text-gray-800 italic uppercase";
                currentPredict = null; return;
            }
            currentPredict = pick;
            n.innerText = pick === 'P' ? 'PLAYER' : 'BANKER';
            n.className = `text-3xl font-black blink italic ${pick === 'P' ? 'text-blue-500' : 'text-red-500'}`;
            a.innerText = "70% CONFIDENCE"; r.innerText = "75%";
        }
        calc();
    </script>
</body>
</html>
