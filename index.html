<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Grey Predictor Dashboard</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { 
            background-color: #1a1c1e; /* สีพื้นหลังหน้าจอทั้งหมด */
            font-family: sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            color: #e2e8f0;
        }
        .main-card {
            background: #2d2f34; /* สีเทาเข้มของตัวการ์ด */
            padding: 24px;
            width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #3f4147;
        }
        /* จอพยากรณ์แบบ Deep Dark */
        .display-box {
            background: #121316;
            border: 1px solid #3f4147;
            margin-bottom: 15px;
            padding: 20px;
            text-align: center;
        }
        /* ปุ่มสี่เหลี่ยมจัตุรัส ขอบเหลี่ยมเป๊ะ */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .square-btn {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 0px !important;
            font-weight: bold;
            font-size: 11px;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .square-btn:active { transform: translateY(2px); filter: brightness(1.2); }

        .btn-p { background-color: #4b5563; border-bottom: 4px solid #374151; } 
        .btn-b { background-color: #71717a; border-bottom: 4px solid #52525b; } 
        .btn-u { background-color: #3f3f46; border-bottom: 4px solid #27272a; } 
        .btn-r { background-color: #18181b; border-bottom: 4px solid #09090b; }

        /* ช่องประวัติแบบคุมโทน */
        .log-box {
            background: #1e2024;
            border: 1px solid #3f4147;
            padding: 10px;
            min-height: 55px;
        }

        .blink { animation: blinker 0.8s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- Display Zone -->
        <div class="display-box">
            <div id="alert" class="text-[10px] text-yellow-500 font-bold h-4 mb-1 uppercase tracking-widest"></div>
            <div id="next" class="text-3xl font-black text-gray-600 italic tracking-tighter">WAITING</div>
            <div class="text-[10px] text-gray-500 mt-2 font-bold uppercase tracking-widest">
                Chance: <span id="rate" class="text-blue-400">0%</span>
            </div>
        </div>

        <!-- History & WinLoss Tracker -->
        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="log-box">
                <p class="text-[9px] font-bold text-gray-500 uppercase mb-1 border-b border-gray-700">History</p>
                <div id="log" class="text-[10px] font-bold tracking-[2px] break-all text-gray-300"></div>
            </div>
            <div class="log-box">
                <p class="text-[9px] font-bold text-gray-500 uppercase mb-1 border-b border-gray-700">Win/Loss</p>
                <div id="check-log" class="text-[12px] flex flex-wrap gap-1"></div>
            </div>
        </div>

        <!-- 4 Square Buttons (Left to Right) -->
        <div class="btn-grid">
            <button onclick="add('P')" class="square-btn btn-p">PLAYER</button>
            <button onclick="add('B')" class="square-btn btn-b">BANKER</button>
            <button onclick="add('undo')" class="square-btn btn-u">UNDO</button>
            <button onclick="add('reset')" class="square-btn btn-r">RESET</button>
        </div>

        <!-- Summary Bar -->
        <div class="flex justify-between mt-4 text-[10px] font-bold text-gray-500 border-t border-gray-700 pt-3 uppercase tracking-tighter">
            <span>WIN: <span id="win-count" class="text-green-500">0</span></span>
            <span>LOSS: <span id="loss-count" class="text-red-500">0</span></span>
            <span>TOTAL: <span id="total" class="text-white">0</span></span>
        </div>
    </div>

    <script>
        let logs = [];
        let currentPredict = null;
        let winLoss = [];

        function add(type) {
            if (type === 'undo') {
                logs.pop();
                winLoss.pop();
            } else if (type === 'reset') {
                if(confirm('รีเซ็ตข้อมูลทั้งหมด?')) {
                    logs = [];
                    winLoss = [];
                    currentPredict = null;
                }
            } else {
                if (currentPredict) {
                    winLoss.push(type === currentPredict ? '✔️' : '❌');
                }
                logs.push(type);
            }
            render();
        }

        function render() {
            document.getElementById('total').innerText = logs.length;
            document.getElementById('win-count').innerText = winLoss.filter(x => x === '✔️').length;
            document.getElementById('loss-count').innerText = winLoss.filter(x => x === '❌').length;
            
            document.getElementById('log').innerHTML = logs.map(x => 
                `<span class="${x === 'P' ? 'text-blue-400' : 'text-red-400'}">${x}</span>`
            ).join('');

            document.getElementById('check-log').innerHTML = winLoss.map(x => 
                `<span class="${x === '✔️' ? 'text-green-500' : 'text-red-500'}">${x}</span>`
            ).join('');

            analyze();
        }

        function analyze() {
            const next = document.getElementById('next');
            const alertBox = document.getElementById('alert');
            const rate = document.getElementById('rate');

            if (logs.length < 3) {
                next.innerText = "WAITING";
                next.className = "text-3xl font-black text-gray-700 italic tracking-tighter";
                currentPredict = null;
                alertBox.innerText = ""; rate.innerText = "0%"; return;
            }

            const last3 = logs.slice(-3).join('');
            let pick = "", msg = "", pct = 0;

            if (logs.slice(-4).every(v => v === 'P')) { pick = "P"; msg = "Dragon P"; pct = 94; }
            else if (logs.slice(-4).every(v => v === 'B')) { pick = "B"; msg = "Dragon B"; pct = 94; }
            else if (last3 === 'PPB') { pick = "P"; msg = "2-Cut-1 Pattern"; pct = 87; }
            else if (last3 === 'BBP') { pick = "B"; msg = "2-Cut-1 Pattern"; pct = 87; }

            if (pick) {
                currentPredict = pick;
                next.innerText = pick === 'P' ? 'PLAYER' : 'BANKER';
                next.className = `text-3xl font-black italic blink ${pick === 'P' ? 'text-blue-400' : 'text-red-400'}`;
                alertBox.innerText = msg;
                rate.innerText = pct + "%";
            } else {
                currentPredict = null;
                next.innerText = "NEXT: ???";
                next.className = "text-xl font-bold text-gray-600";
                alertBox.innerText = ""; rate.innerText = "0%";
            }
        }
    </script>
</body>
</html>
